<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consultorio Médico de Triaje</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para íconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-62X506T2H4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-62X506T2H4', { 'debug_mode': true });

      // GA4: Eventos personalizados mejorados
      window.trackGA = function(action, params = {}) {
        if (typeof gtag === 'function') {
          gtag('event', action, params);
        }
      };
    </script>

    <!-- Microsoft Clarity - Mapas de Calor y Grabaciones de Sesiones -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "x8pwif0ev8");
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        medical: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6', // Teal principal
                            600: '#0d9488',
                            700: '#0f766e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Personalización del scrollbar del chat */
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Animación del indicador de escritura */
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px;
            background: #0d9488;
            border-radius: 50%;
            display: inline-block; margin: 0 2px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }
        /* Efecto Glassmorphism para el header */
        .glass-header {
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.95), rgba(15, 118, 110, 0.95));
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] flex flex-col items-center justify-center sm:p-6">
    
    <!-- Contenedor Principal (Ocupa todo en móvil, amplio y flotante en PC) -->
    <main class="flex flex-col w-full h-full max-w-4xl bg-white sm:rounded-3xl shadow-2xl overflow-hidden relative border border-gray-200 sm:max-h-[85vh]">
        
        <!-- Encabezado Médico -->
        <header class="glass-header text-white px-5 py-4 flex items-center justify-between z-10 shadow-md">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl text-white w-12 h-12 flex items-center justify-center shadow-inner backdrop-blur-sm">
                    <i class="fa-solid fa-stethoscope text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-wide">Dr. Vital</h1>
                    <p class="text-medical-100 text-xs font-medium flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> IA Médica Activa
                    </p>
                </div>
            </div>
            <button class="text-white/80 hover:text-white transition">
                <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
            </button>
        </header>

        <!-- Área de Chat (data-clarity-mask protege contenido médico sensible en grabaciones) -->
        <div id="chat-messages" class="chat-container flex-1 overflow-y-auto p-4 space-y-5 bg-slate-50/50 pb-28" data-clarity-mask="true">
            <!-- Mensajes dinámicos -->
        </div>

        <!-- Indicador de escritura Flotante -->
        <div id="typing-indicator" class="hidden absolute bottom-20 left-4 bg-white/90 backdrop-blur-sm border border-gray-100 rounded-full px-4 py-2 shadow-lg flex items-center gap-2 text-xs font-medium text-gray-500 z-10 transition-all">
            Dr. Vital está analizando <div class="typing-indicator flex items-center mt-0.5"><span></span><span></span><span></span></div>
        </div>

        <!-- Área de Entrada de Texto -->
        <div class="bg-white border-t border-gray-100 px-4 py-3 absolute bottom-0 w-full shadow-[0_-4px_15px_-5px_rgba(0,0,0,0.05)]">
            <form id="chat-form" class="flex items-center gap-2">
                <div class="flex-1 bg-gray-100 rounded-full flex items-center px-4 py-1 border border-transparent focus-within:border-medical-500 focus-within:bg-white transition-all shadow-inner">
                    <input 
                        type="text" 
                        id="user-input" 
                        class="w-full bg-transparent py-2.5 text-sm focus:outline-none text-gray-700 placeholder-gray-400"
                        placeholder="Escribe tus síntomas..."
                        autocomplete="off"
                        required
                        data-clarity-mask="true"
                    >
                </div>
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-medical-600 hover:bg-medical-700 active:scale-95 text-white rounded-full h-11 w-11 flex items-center justify-center transition-all shadow-md shrink-0"
                >
                    <i class="fa-solid fa-paper-plane ml-[-2px]"></i>
                </button>
            </form>
            <p class="text-center text-[9px] text-gray-400 mt-2 font-medium">
                Tus datos son privados. Para emergencias, llama al 911.
            </p>
        </div>
    </main>

    <script>
        let chatHistory = [];

        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');
        const sendBtn = document.getElementById('send-btn');

        let sessionStarted = false;

        window.addEventListener('DOMContentLoaded', () => {
            const initialMessage = "¡Hola! Soy el **Dr. Vital**. Estoy aquí para orientarte sobre tu salud. ¿Cuáles son los síntomas que te molestan hoy?";
            chatHistory.push({ role: "model", content: initialMessage });
            renderMessage(initialMessage, 'model');
            trackGA('page_view_detail', { page_title: 'Chat de Triaje', page_location: window.location.href });
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            chatHistory.push({ role: "user", content: message });
            renderMessage(message, 'user');

            // GA4: Inicio de sesión y envío de mensajes
            if (!sessionStarted) {
                sessionStarted = true;
                trackGA('session_start', { event_category: 'engagement', event_label: 'first_message' });
            }
            trackGA('message_sent', { event_category: 'chat', event_label: 'user_message', message_count: chatHistory.length });

            typingIndicator.classList.remove('hidden');
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: chatHistory })
                });

                if (!response.ok) throw new Error("Error del servidor");

                const data = await response.json();
                const modelReply = data.response;

                chatHistory.push({ role: "model", content: modelReply });
                renderMessage(modelReply, 'model');

                if (data.isFinished) {
                    trackGA('consultation_complete', {
                        event_category: 'conversion',
                        event_label: 'triage_finished',
                        message_count: chatHistory.length,
                        was_emergency: data.isEmergency || false
                    });
                    renderFeedbackButtons();
                    // Ocultar el área de entrada al finalizar
                    chatForm.parentElement.classList.add('opacity-0', 'pointer-events-none', 'translate-y-10');
                    setTimeout(() => chatForm.parentElement.classList.add('hidden'), 500);
                }

            } catch (error) {
                renderMessage("Error de conexión. Intenta nuevamente.", 'error');
                chatHistory.pop(); 
            } finally {
                typingIndicator.classList.add('hidden');
                if (!chatForm.parentElement.classList.contains('hidden')) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }
                scrollToBottom();
            }
        });

        function renderMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex w-full ${sender === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;

            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong class="font-semibold">$1</strong>').replace(/\n/g, '<br>');

            if (sender === 'user') {
                msgDiv.innerHTML = `
                    <div class="bg-medical-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%] shadow-md text-[15px] leading-relaxed">
                        ${formattedText}
                    </div>
                `;
            } else if (sender === 'model') {
                msgDiv.innerHTML = `
                    <div class="flex items-end gap-2 max-w-[90%]">
                        <div class="bg-medical-50 text-medical-600 rounded-full h-8 w-8 flex items-center justify-center shrink-0 mb-1 border border-medical-200 shadow-sm">
                            <i class="fa-solid fa-stethoscope text-xs"></i>
                        </div>
                        <div class="bg-white border border-gray-100 text-gray-700 rounded-2xl rounded-tl-sm px-4 py-3 shadow-md text-[15px] leading-relaxed">
                            ${formattedText}
                        </div>
                    </div>
                `;
            } else if (sender === 'error') {
                msgDiv.innerHTML = `
                    <div class="bg-red-50 text-red-600 border border-red-200 rounded-xl px-4 py-2 max-w-[85%] text-sm mx-auto text-center shadow-sm">
                        <i class="fa-solid fa-circle-exclamation mr-1"></i> ${text}
                    </div>
                `;
            }

            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Reportar scroll del chat a Clarity
        chatMessages.addEventListener('scroll', () => {
            const scrollPercent = chatMessages.scrollTop / (chatMessages.scrollHeight - chatMessages.clientHeight);
            window.clarity && window.clarity('set', 'chatScrollDepth', Math.round(scrollPercent * 100));
        });

        function renderFeedbackButtons() {
            const btnDiv = document.createElement('div');
            btnDiv.className = "flex flex-col items-center gap-4 py-8 animate-fade-in";
            btnDiv.innerHTML = `
                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl flex flex-col items-center gap-4 max-w-sm w-full mx-auto">
                    <div class="w-12 h-12 bg-medical-50 rounded-full flex items-center justify-center text-medical-600 mb-2">
                        <i class="fa-solid fa-star text-xl"></i>
                    </div>
                    <p class="text-[15px] font-semibold text-gray-700 text-center">¿Te ha sido útil la orientación del Dr. Vital?</p>
                    <div class="flex gap-3 w-full">
                        <button id="btn-accept" class="flex-1 px-4 py-3 bg-medical-600 text-white rounded-2xl font-bold shadow-lg hover:bg-medical-700 hover:shadow-medical-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-check"></i> Aceptar
                        </button>
                        <button id="btn-reject" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 text-gray-500 rounded-2xl font-bold shadow-sm hover:bg-gray-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-xmark"></i> Rechazar
                        </button>
                    </div>
                </div>
            `;
            chatMessages.appendChild(btnDiv);
            scrollToBottom();

            document.getElementById('btn-accept').onclick = () => sendFeedback('aceptar', btnDiv);
            document.getElementById('btn-reject').onclick = () => sendFeedback('rechazar', btnDiv);
        }

        function sendFeedback(type, container) {
            // Google Analytics Event
            trackGA('consulta_feedback', {
                event_category: 'feedback',
                event_label: type,
                value: type === 'aceptar' ? 1 : 0
            });

            // Animación de salida y cambio a mensaje de agradecimiento
            container.innerHTML = `
                <div class="bg-medical-50 border border-medical-100 p-4 rounded-2xl animate-fade-in flex items-center gap-3">
                    <div class="bg-medical-500 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-sm">
                        <i class="fa-solid fa-heart text-xs"></i>
                    </div>
                    <p class="text-sm font-bold text-medical-700">
                        ${type === 'aceptar' ? '¡Me alegra haberte ayudado! Cuídate mucho.' : 'Gracias por tu feedback, seguiremos mejorando.'}
                    </p>
                </div>
            `;
            
            // Botón para reiniciar si lo desean (opcional, pero mejora UX)
            const resetBtn = document.createElement('button');
            resetBtn.className = "mt-4 text-xs font-medium text-medical-600 hover:underline";
            resetBtn.innerText = "Nueva consulta";
            resetBtn.onclick = () => {
                trackGA('new_consultation', { event_category: 'engagement', event_label: 'restart' });
                window.location.reload();
            };
            container.appendChild(resetBtn);
        }
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</body>
</html>
